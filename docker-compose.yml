services:
  postgres:
    image: postgres:16-alpine
    container_name: kaoyan-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaoyan
      POSTGRES_PASSWORD: kaoyan_password
      POSTGRES_DB: kaoyan_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaoyan -d kaoyan_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
